<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna Chat</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.login, .chat {
  width: 360px;
  max-width: 95%;
  background: #1f1f2d;
  border-radius: 12px;
  padding: 12px;
  box-shadow: 0 0 20px rgba(0,0,0,.6);
}

.login {
  text-align: center;
}

.login input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: none;
}

.login button {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: none;
  background: #ffcc66;
  font-weight: bold;
}

.chat {
  display: none;
  flex-direction: column;
  height: 540px;
}

.avatar {
  text-align: center;
  margin-bottom: 6px;
}

.avatar img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 3px solid #ffcc66;
}

.window {
  flex: 1;
  overflow-y: auto;
  background: #141421;
  border-radius: 6px;
  padding: 8px;
  margin-bottom: 6px;
}

.msg {
  margin: 6px 0;
}

.user { color: #9acdff; }
.luna { color: #ffcc66; }

input[type="text"] {
  width: 100%;
  padding: 9px;
  border-radius: 6px;
  border: none;
  margin-bottom: 6px;
}

.buttons {
  display: flex;
  gap: 6px;
}

button {
  flex: 1;
  padding: 9px;
  border-radius: 6px;
  border: none;
  background: #ffcc66;
  font-weight: bold;
}

.mic {
  background: #6cf;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginBox">
  <h3>🔒 Acesso Luna</h3>
  <input type="password" id="pass" placeholder="156478">
  <button onclick="login()">Entrar</button>
  <p id="erro" style="color:#ff6b6b"></p>
</div>

<!-- CHAT -->
<div class="chat" id="chatBox">
  <div class="avatar">
    <img src="assets/imagens/luna/logoluna.jpg">
  </div>

  <div class="window" id="window"></div>

  <input type="text" id="input" placeholder="Digite ou fale...">

  <div class="buttons">
    <button onclick="enviar()">Enviar</button>
    <button class="mic" onclick="ouvir()">🎤</button>
  </div>
</div>

<script>
/* ===== CONFIG ===== */
const API_URL = "https://comandos-mmmu.onrender.com/predict";
const API_KEY = "156478";
const CHAT_PASSWORD = "156478";
/* ================== */

const loginBox = document.getElementById("loginBox");
const chatBox = document.getElementById("chatBox");
const erro = document.getElementById("erro");
const windowChat = document.getElementById("window");
const input = document.getElementById("input");

function login() {
  if (document.getElementById("pass").value === CHAT_PASSWORD) {
    loginBox.style.display = "none";
    chatBox.style.display = "flex";
  } else {
    erro.textContent = "Senha incorreta";
  }
}

function add(text, cls) {
  const d = document.createElement("div");
  d.className = "msg " + cls;
  d.textContent = text;
  windowChat.appendChild(d);
  windowChat.scrollTop = windowChat.scrollHeight;
}

async function enviar() {
  const msg = input.value.trim();
  if (!msg) return;

  add("Você: " + msg, "user");
  input.value = "";

  try {
    const r = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": API_KEY
      },
      body: JSON.stringify({ message: msg })
    });

    const data = await r.json();
    const resp = data.response || "Não encontrei resposta.";

    add("Luna: " + resp, "luna");
    falar(resp);

  } catch {
    add("Luna: Erro ao conectar com a API 😢", "luna");
  }
}

function falar(texto) {
  const u = new SpeechSynthesisUtterance(texto);
  u.lang = "pt-BR";
  u.pitch = 1.2;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function ouvir() {
  if (!("webkitSpeechRecognition" in window)) {
    alert("Microfone não suportado");
    return;
  }
  const r = new webkitSpeechRecognition();
  r.lang = "pt-BR";
  r.start();
  r.onresult = e => {
    input.value = e.results[0][0].transcript;
    enviar();
  };
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter") enviar();
});
</script>

</body>
</html>
