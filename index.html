<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<style>
body {
    background: #0f172a;
    font-family: Arial;
    color: white;
}
#chat {
    max-width: 400px;
    margin: auto;
    margin-top: 40px;
    background: #020617;
    padding: 15px;
    border-radius: 10px;
}
.msg { margin: 6px 0; }
.user { color: #38bdf8; }
.luna { color: #a78bfa; }
input { width: 75%; padding: 8px; }
button { padding: 8px; }
</style>
</head>
<body>

<div id="chat">
    <h3>🌙 Luna</h3>
    <div id="messages"></div>
    <input id="texto" placeholder="Digite algo">
    <button onclick="enviar()">Enviar</button>
</div>

<script>
// 👉 TROQUE AQUI SE QUISER OUTRA API
const API = "https://comandos-mmmu.onrender.com/chat";

function enviar() {
    const texto = document.getElementById("texto").value.trim();
    if (!texto) return;

    add("Você", texto, "user");

    fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ texto: texto })
    })
    .then(res => res.json())
    .then(data => {
        console.log("API respondeu:", data);

        // 🔥 ADAPTAÇÃO IMPORTANTE
        const resposta =
            data.resposta ||
            data.response ||
            data.msg ||
            "🌙 Recebi, mas não sei responder agora.";

        add("Luna", resposta, "luna");
    })
    .catch(err => {
        console.error(err);
        add("Luna", "Erro de conexão 😢", "luna");
    });

    document.getElementById("texto").value = "";
}

function add(nome, texto, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerHTML = `<b>${nome}:</b> ${texto}`;
    document.getElementById("messages").appendChild(div);
}
</script>

</body>
</html>
