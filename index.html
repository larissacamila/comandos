<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Luna</title>
<style>
body {
    background: #0f172a;
    font-family: Arial;
    color: white;
    display: flex;
    justify-content: center;
    margin: 0;
    padding: 0;
}
#chat {
    max-width: 400px;
    margin-top: 40px;
    background: #020617;
    padding: 15px;
    border-radius: 10px;
}
.msg { 
    margin: 6px 0; 
    word-wrap: break-word;
}
.user { color: #38bdf8; }
.luna { color: #a78bfa; }
input { width: 70%; padding: 8px; border-radius: 4px; border: none; }
button { padding: 8px 12px; border-radius: 4px; border: none; background: #38bdf8; color: #000; cursor: pointer; }
.avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    vertical-align: middle;
    margin-right: 8px;
}
img.msg-img {
    max-width: 150px;
    border-radius: 8px;
    margin-top: 5px;
}
</style>
</head>
<body>

<div id="chat">
    <h3>🌙 Luna</h3>
    <div id="messages"></div>
    <input id="texto" placeholder="Digite algo">
    <button onclick="enviar()">Enviar</button>
</div>

<script>
// ===== CONFIGURAÇÕES =====
const API = "https://comandos-mmmu.onrender.com/chat"; // se quiser falar com API
// Lista de imagens na pasta raiz /images/
const imagens = {
    "gato": "gato.jpg",
    "cachorro": "cachorro.jpg",
    "lua": "lua.jpeg"
};

// ===== FUNÇÃO ENVIAR =====
function enviar() {
    const texto = document.getElementById("texto").value;
    if (!texto) return;

    add("Você", texto, "user");

    // Simulação de API ou local
    fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ texto: texto })
    })
    .then(res => res.json())
    .then(data => {
        // remove emojis do texto
        let resposta = data.response.replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|\uFE0F)/g, '');
        add("Luna", resposta, "luna");
    })
    .catch(err => {
        console.error(err);
        add("Luna", "Erro de conexão 😢", "luna");
    });

    document.getElementById("texto").value = "";
}

// ===== FUNÇÃO ADD =====
function add(nome, texto, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;

    // Verifica palavras-chave de imagens
    let encontrado = false;
    for (const key in imagens) {
        if (texto.toLowerCase().includes(key)) {
            div.innerHTML = `<img class="avatar" src="${imagens[key]}"> <b>${nome}:</b><br><img class="msg-img" src="${imagens[key]}">`;
            encontrado = true;
            break;
        }
    }

    if (!encontrado) {
        div.innerHTML = `<b>${nome}:</b> ${texto}`;
    }

    document.getElementById("messages").appendChild(div);
    div.scrollIntoView({ behavior: "smooth" });
}
</script>

</body>
</html>
