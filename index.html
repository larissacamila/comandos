<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna Mobile</title>

<style>
body {
    margin: 0;
    background: #0f172a;
    font-family: Arial, sans-serif;
    color: white;
    display: flex;
    justify-content: center;
}

#app {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: #020617;
}

/* TOPO */
header {
    text-align: center;
    padding: 12px;
    background: #020617;
}

/* AVATAR */
#avatar {
    width: 120px;
    height: 120px;
    margin: 10px auto;
    border-radius: 50%;
    background: radial-gradient(circle at top, #a78bfa, #312e81);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    box-shadow: 0 0 25px rgba(167,139,250,0.6);
}

/* CHAT */
#messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.msg {
    margin: 6px 0;
    font-size: 14px;
}
.user { color: #38bdf8; }
.luna { color: #a78bfa; }

/* CONTROLES */
#controls {
    display: flex;
    gap: 6px;
    padding: 10px;
    background: #020617;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="app">

<header>
    <h3>🌙 Luna</h3>
    <div id="avatar">🤖</div>
</header>

<div id="messages"></div>

<div id="controls">
    <input id="texto" placeholder="Digite ou fale">
    <button onclick="enviar()">➤</button>
    <button onclick="ouvir()">🎤</button>
</div>

</div>

<script>
const API = "https://comandos-mmmu.onrender.com/chat";

// =========================
// ENVIO TEXTO
// =========================
function enviar(textoManual = null) {
    const input = document.getElementById("texto");
    const texto = textoManual || input.value.trim();
    if (!texto) return;

    add("Você", texto, "user");
    animarAvatar(true);

    fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ texto })
    })
    .then(res => res.json())
    .then(data => {
        const resposta =
            data.resposta ||
            data.response ||
            data.msg ||
            "🌙 Recebi, mas não sei responder agora.";

        add("Luna", resposta, "luna");
        falar(resposta);
    })
    .catch(() => {
        add("Luna", "Erro de conexão 😢", "luna");
    });

    input.value = "";
}

// =========================
// MICROFONE
// =========================
function ouvir() {
    if (!("webkitSpeechRecognition" in window)) {
        alert("Microfone não suportado");
        return;
    }

    const rec = new webkitSpeechRecognition();
    rec.lang = "pt-BR";

    animarAvatar(true);
    rec.start();

    rec.onresult = e => {
        const texto = e.results[0][0].transcript;
        enviar(texto);
    };

    rec.onerror = () => {
        animarAvatar(false);
        add("Sistema", "Erro ao ouvir 😢", "luna");
    };
}

// =========================
// VOZ
// =========================
function falar(texto) {
    if (!("speechSynthesis" in window)) return;

    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang = "pt-BR";

    voz.onend = () => animarAvatar(false);
    speechSynthesis.speak(voz);
}

// =========================
// AVATAR
// =========================
function animarAvatar(ativo) {
    const avatar = document.getElementById("avatar");
    avatar.style.boxShadow = ativo
        ? "0 0 35px #a78bfa"
        : "0 0 15px rgba(167,139,250,0.5)";
}

// =========================
// UI
// =========================
function add(nome, texto, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerHTML = `<b>${nome}:</b> ${texto}`;
    const msg = document.getElementById("messages");
    msg.appendChild(div);
    msg.scrollTop = msg.scrollHeight;
}
</script>

</body>
</html>
