<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Assistente Luna</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
}

.container {
    width: 360px;
    background: rgba(0,0,0,0.6);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
}

.avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: url("https://i.imgur.com/0y0y0y0.png") center/cover;
    margin: 0 auto 10px;
}

h2 {
    margin: 5px 0 15px;
}

#output {
    min-height: 60px;
    background: rgba(255,255,255,0.1);
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 15px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #00c6ff;
    color: #000;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #00a3d9;
}
</style>
</head>

<body>

<div class="container">
    <div class="avatar"></div>
    <h2>Luna</h2>

    <div id="output">Clique e fale comigo…</div>

    <button onclick="startListening()">🎙️ Falar</button>
</div>

<script>
const API_URL = "https://comandos-mmmu.onrender.com/ask";
const API_KEY = "156478";

const output = document.getElementById("output");

// Speech Recognition
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "pt-BR";
recognition.interimResults = false;

function startListening() {
    output.innerText = "Ouvindo...";
    recognition.start();
}

recognition.onresult = function(event) {
    const text = event.results[0][0].transcript;
    output.innerText = "Você: " + text;
    sendToAPI(text);
};

recognition.onerror = function() {
    output.innerText = "Erro ao ouvir. Tente novamente.";
};

function sendToAPI(text) {
    fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "x-api-key": API_KEY
        },
        body: JSON.stringify({ text })
    })
    .then(res => res.json())
    .then(data => {
        const response = data.response || "Erro na resposta.";
        output.innerText = "Luna: " + response;
        speak(response);
    })
    .catch(() => {
        output.innerText = "Erro ao conectar com a API.";
    });
}

// Speech Synthesis (voz feminina)
function speak(text) {
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "pt-BR";

    const voices = speechSynthesis.getVoices();
    const female = voices.find(v => v.lang === "pt-BR" && v.name.toLowerCase().includes("female"));
    if (female) msg.voice = female;

    speechSynthesis.speak(msg);
}
</script>

</body>
</html>
