<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna - Assistente Web</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: url('https://images.unsplash.com/photo-1601758123927-2a3d2a5e11f7?auto=format&fit=crop&w=1350&q=80') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}
h1 { margin-bottom: 10px; }
#relogio { font-size: 1.2em; margin-bottom: 20px; }
#chat {
    width: 90%;
    max-width: 600px;
    height: 350px;
    border: 1px solid #555;
    overflow-y: auto;
    padding: 10px;
    background: rgba(0,0,0,0.6);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
}
.mensagem {
    margin: 5px 0;
    padding: 5px 10px;
    border-radius: 10px;
    max-width: 80%;
}
.usuario { background: #4a90e2; align-self: flex-end; }
.luna { background: #34d399; align-self: flex-start; display: flex; align-items: center; }
.luna img { width: 30px; height: 30px; border-radius: 50%; margin-right: 5px; }
#entrada { width: 90%; max-width: 600px; display: flex; margin-top: 10px; }
#entrada input { flex: 1; padding: 10px; border-radius: 5px; border: none; }
#entrada button { padding: 10px 15px; margin-left: 5px; border-radius: 5px; border: none; background: #4a90e2; color: white; cursor: pointer; }
</style>
</head>
<body>

<h1>🌙 Luna - Assistente Web</h1>
<div id="relogio"></div>

<div id="chat"></div>

<div id="entrada">
    <input type="text" id="mensagemInput" placeholder="Digite sua mensagem...">
    <button onclick="enviarMensagem()">Enviar</button>
    <button onclick="ouvirVoz()">🎤 Falar</button>
</div>

<script>
const API_URL = "https://comandos-mmmu.onrender.com/predict"; // seu endpoint
const API_KEY = "156478"; // coloque sua chave

// Relógio
function atualizarRelogio() {
    const agora = new Date();
    const opcoes = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById("relogio").textContent =
        `${agora.toLocaleTimeString()} - ${agora.toLocaleDateString('pt-BR', opcoes)}`;
}
setInterval(atualizarRelogio, 1000);
atualizarRelogio();

// Chat
function adicionarMensagem(texto, remetente) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "mensagem " + remetente;
    if(remetente === "luna") {
        const img = document.createElement("img");
        img.src = "https://i.imgur.com/3GvwNBf.png"; // avatar
        div.appendChild(img);
    }
    const span = document.createElement("span");
    span.textContent = texto;
    div.appendChild(span);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// Envia mensagem
async function enviarMensagem() {
    const input = document.getElementById("mensagemInput");
    const mensagem = input.value.trim();
    if(!mensagem) return;
    adicionarMensagem(mensagem, "usuario");
    input.value = "";

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            headers: { 
                "Content-Type": "application/json",
                "Authorization": `Bearer ${API_KEY}`
            },
            body: JSON.stringify({ message: mensagem })
        });
        const data = await response.json();
        const resposta = data.response || "🌙 Não consegui processar sua solicitação.";
        adicionarMensagem(resposta, "luna");
        falar(resposta);
    } catch(e) {
        adicionarMensagem("🌙 Erro ao conectar com a API.", "luna");
        console.error(e);
    }
}

// Fala
function falar(texto) {
    if(!('speechSynthesis' in window)) return;
    const msg = new SpeechSynthesisUtterance(texto);
    msg.lang = 'pt-BR';
    msg.pitch = 1;
    msg.rate = 1;
    msg.voice = speechSynthesis.getVoices().find(v => v.lang === "pt-BR") || null;
    window.speechSynthesis.speak(msg);
}

// Voz
function ouvirVoz() {
    if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
        alert("Seu navegador não suporta reconhecimento de voz.");
        return;
    }
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'pt-BR';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.start();

    recognition.onresult = (event) => {
        const fala = event.results[0][0].transcript;
        document.getElementById("mensagemInput").value = fala;
        enviarMensagem();
    };

    recognition.onerror = (event) => console.error("Erro no reconhecimento de voz:", event.error);
}

// Enter
document.getElementById("mensagemInput").addEventListener("keypress", function(e){
    if(e.key === "Enter") enviarMensagem();
});
</script>
</body>
</html>
