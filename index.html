<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Luna – Teste de Conexão</title>
</head>
<body>

<h2>Chat Luna (teste direto)</h2>

<input id="msg" placeholder="Digite algo">
<button onclick="enviar()">Enviar</button>

<p id="resposta"></p>

<script>
const API_URL = "https://comandos-mmmu.onrender.com/chat";

function enviar() {
    const texto = document.getElementById("msg").value;

    fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ texto: texto })
    })
    .then(res => {
        if (!res.ok) {
            throw new Error("HTTP " + res.status);
        }
        return res.json();
    })
    .then(data => {
        document.getElementById("resposta").innerText = data.resposta;
    })
    .catch(err => {
        document.getElementById("resposta").innerText = "Erro de conexão 😢";
        console.error("Erro:", err);
    });
}
</script>

</body>
</html>
